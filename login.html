<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Gift | Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <a class="brand" href="index.html">
            <img src="logo.png" alt="Special Gift Logo">
            <span>Special Gift</span>
        </a>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="faq.html">FAQs & Policy</a></li>
                <li><a href="login.html" class="active">Login</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main class="form-page reveal">
        <form id="login-form" class="pretty-form glass-card">
            <p class="eyebrow">Customer Area</p>
            <h1>Login</h1>

            <label for="login-email">Email Address</label>
            <input 
                type="email" 
                id="login-email" 
                placeholder="Enter your email" 
                required
            >

            <label for="login-password">Password</label>
            <input 
                type="password" 
                id="login-password" 
                placeholder="Enter your password" 
                required 
                minlength="6"
            >

            <button type="submit" class="primary-btn full-btn">Login</button>
            <button type="button" id="logout-btn" class="secondary-btn full-btn">Logout</button>

            <p id="login-message" class="status-message"></p>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Special Gift. Custom Design Co.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
